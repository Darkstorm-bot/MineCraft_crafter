services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -lc "
        pip install -r requirements.txt -q &&
        python scripts/init_db.py &&
        PYTHONPATH=src uvicorn api.app:app --host 0.0.0.0 --port 8080 --reload
      "
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - minecraft_net

  bot:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -lc "
        npm install &&
        npm run build &&
        node dist/index.js
      "
    env_file:
      - .env
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - minecraft_net

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - minecraft_net

volumes:
  ollama_data:
    driver: local
  data:
    driver: local

networks:
  minecraft_net:
    driver: bridge
